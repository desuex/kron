name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            go.work
            core/go.mod
            daemon/go.mod
            operator/go.mod
            cmd/krontab/go.mod
      - name: Build krontab binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          bin_name="krontab"
          if [ "${GOOS}" = "windows" ]; then
            bin_name="krontab.exe"
          fi

          go build -o "dist/${bin_name}" ./cmd/krontab

          pkg="krontab_${GOOS}_${GOARCH}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -q "${pkg}.zip" "${bin_name}"
              rm -f "${bin_name}"
            )
          else
            (
              cd dist
              tar -czf "${pkg}.tar.gz" "${bin_name}"
              rm -f "${bin_name}"
            )
          fi
      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: krontab-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/krontab_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum krontab_* > SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@a06a81ae8f6ba8d919b3a3dfeb3b17e415e1f4d1 # v2
        with:
          files: |
            dist/krontab_*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
