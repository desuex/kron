name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            go.work
            core/go.mod
            daemon/go.mod
            operator/go.mod
            cmd/krontab/go.mod
      - name: CI checks
        run: ./scripts/ci.sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build docs (Sphinx)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          sphinx-build -n -W -b html docs docs/_build/html
      - name: Benchmark guard (non-blocking baseline phase)
        env:
          MAX_M1000_NODUE_NS: "3000000"
          MAX_M1000_DUE_NS: "8000000"
          MAX_STATE_SAVE_NS: "12000000"
        continue-on-error: true
        run: |
          ./scripts/bench_check.sh --report-dir artifacts/bench
          if [ -f artifacts/bench/summary.md ]; then
            cat artifacts/bench/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Generate coverage report
        run: go test ./core/... ./daemon/... ./operator/... ./cmd/krontab/... -coverprofile=coverage.txt -covermode=atomic
      - name: Upload coverage reports to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.txt
          disable_search: true
          fail_ci_if_error: true
          verbose: true
