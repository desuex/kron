# SonarCloud quality profile tuning for current monorepo stage.
#
# We intentionally keep cron/config parsing logic duplicated across CLI and daemon
# while the shared parser package is still planned work. Track refactor in roadmap.

# Ensure Go test files are treated as tests and not part of duplication metrics.
sonar.test.inclusions=**/*_test.go

# Temporary CPD exclusions for known intentional parser duplication.
sonar.cpd.exclusions=**/*_test.go,daemon/pkg/daemon/cron.go,daemon/pkg/daemon/constraints.go,daemon/pkg/daemon/parse.go
